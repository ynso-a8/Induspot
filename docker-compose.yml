version: '3.8'

services:
  # FastAPI Backend API Service
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: induspot-api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - ENV=development
      - SUPABASE_URL=${SUPABASE_URL:-https://your-supabase-project.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-your-supabase-anon-key}
      - JWT_SECRET=${JWT_SECRET:-your-supabase-jwt-secret}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-your-pinecone-api-key}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-induspot-poi-index}
    restart: always

  # Local DB for Dev (Optional, if using local DB instead of Supabase cloud directly)
  postgres:
    image: postgres:15-alpine
    container_name: induspot-postgres
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: induspot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
